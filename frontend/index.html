<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SQL Agent Chatbot</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>SQL Agent</h1>
      <p>Ask in plain English. The agent retrieves similar report SQL snippets from pgvector RAG and generates SQL.</p>

      <textarea id="question" rows="5" placeholder="Example: Show weekly active users by country for last 90 days"></textarea>
      <button id="sendBtn">Generate SQL</button>

      <section>
        <h2>Generated SQL</h2>
        <pre id="sqlOutput"></pre>
      </section>

      <section>
        <h2>Retrieved Context</h2>
        <div id="examples"></div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
